<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Access</title>
    <style>
        :root {
            /* Neobrutalist Login Variables */
            --bg-color: #e0e5ec;
            --box-bg: #ffdf00;
            --btn-bg: #ff4949;
            --border-dark: #000000;
            
            /* Dark Skeuomorphic Variables */
            --dark-surface: #222327;
            --dark-bg: #18191c;
            --neon-blue: #5b93ff;
            --neon-purple: #b65bff;
            --screen-bg: #101114;
        }
        
        body {
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.8s ease; 
        }

        /* --- 1. NEOBRUTALIST LOGIN (Unchanged) --- */
        .login-container {
            background-color: var(--box-bg);
            border: 4px solid var(--border-dark);
            box-shadow: 12px 12px 0px var(--border-dark);
            padding: 40px;
            width: 320px;
            text-align: center;
        }
        .login-container h2 {
            font-size: 28px; margin-top: 0; margin-bottom: 30px;
            border-bottom: 4px solid var(--border-dark); padding-bottom: 10px;
        }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-weight: bold; display: block; margin-bottom: 5px; }
        .input-group input {
            width: 100%; padding: 12px;
            border: 3px solid var(--border-dark);
            box-sizing: border-box; font-family: inherit; font-size: 16px;
        }
        .login-btn {
            width: 100%; background-color: var(--btn-bg); color: white;
            border: 3px solid var(--border-dark); padding: 15px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 6px 6px 0px var(--border-dark);
        }
        .login-btn:active {
            box-shadow: 0px 0px 0px var(--border-dark); transform: translate(6px, 6px);
        }
        #message {
            margin-top: 20px; font-weight: bold; padding: 10px;
            display: none; border: 3px solid var(--border-dark);
        }
        .error { background-color: #ff9999; }
        .success { background-color: #99ff99; }

        /* --- 2. DARK SKEUOMORPHIC DASHBOARD --- */
        .dashboard-container {
            display: none; 
            width: 700px;
            /* Matte dark metal/plastic body */
            background: var(--dark-surface);
            border-radius: 20px;
            padding: 40px;
            /* Outer soft drop shadow + top inner highlight to simulate 3D form */
            box-shadow: 
                25px 25px 50px rgba(0,0,0,0.5), 
                -10px -10px 30px rgba(255,255,255,0.03),
                inset 1px 1px 2px rgba(255,255,255,0.08),
                inset -1px -1px 2px rgba(0,0,0,0.5);
            border: 1px solid #111;
            position: relative;
        }

        /* Subtle corner hardware details */
        .corner-detail {
            position: absolute; width: 30px; height: 30px;
            border-radius: 5px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), inset -1px -1px 2px rgba(255,255,255,0.05);
        }
        .tl { top: 10px; left: 10px; } .tr { top: 10px; right: 10px; }
        .bl { bottom: 10px; left: 10px; } .br { bottom: 10px; right: 10px; }

        /* Recessed LED Screen */
        .glass-screen {
            background: var(--screen-bg);
            border-radius: 12px;
            padding: 30px;
            /* Deep inset shadow to make it look sunken into the casing */
            box-shadow: 
                inset 8px 8px 15px rgba(0,0,0,0.8), 
                inset -4px -4px 10px rgba(255,255,255,0.02),
                0px 1px 1px rgba(255,255,255,0.08); /* Bottom lip highlight */
            margin-bottom: 40px;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            overflow: hidden;
        }

        /* Simulated scanlines over the screen */
        .glass-screen::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Screen Typography */
        .glass-screen h2 { 
            margin-top: 0; font-size: 24px; letter-spacing: 2px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(91, 147, 255, 0.6);
            border-bottom: 1px solid rgba(91, 147, 255, 0.2);
            padding-bottom: 15px; margin-bottom: 25px;
            text-transform: uppercase;
        }
        
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .data-item {
            display: flex; flex-direction: column;
        }

        .data-label {
            font-size: 12px; color: #555;
            letter-spacing: 1px; margin-bottom: 5px;
            text-transform: uppercase;
        }

        .data-value {
            font-size: 18px; color: var(--neon-purple);
            text-shadow: 0 0 8px rgba(182, 91, 255, 0.6);
        }
        
        /* Cyan variant for specific metrics */
        .data-value.cyan {
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(91, 147, 255, 0.6);
        }

        /* Physical Matte Button Controls */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .decorative-slider {
            width: 60%; height: 8px;
            background: #111;
            border-radius: 4px;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.05);
            position: relative;
        }

        .slider-thumb {
            width: 24px; height: 24px;
            background: linear-gradient(135deg, #3a3b40, #1f2024);
            border-radius: 50%;
            position: absolute; top: -8px; left: 70%;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.6), inset 1px 1px 2px rgba(255,255,255,0.1);
            border: 2px solid #111;
        }

        .logout-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: none; cursor: pointer;
            /* Raised rubber/metal texture */
            background: linear-gradient(145deg, #28292d, #1d1e22);
            box-shadow:  
                8px 8px 16px rgba(0,0,0,0.4), 
                -4px -4px 10px rgba(255,255,255,0.03),
                inset 1px 1px 1px rgba(255,255,255,0.05);
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s ease;
        }

        /* Glowing power icon inside the button */
        .power-icon {
            width: 20px; height: 20px;
            border: 3px solid #ff4b4b;
            border-radius: 50%;
            border-top-color: transparent;
            position: relative;
            box-shadow: 0 0 10px rgba(255, 75, 75, 0.4), inset 0 0 10px rgba(255, 75, 75, 0.4);
        }
        .power-icon::before {
            content: ''; position: absolute;
            top: -6px; left: 7px; width: 3px; height: 12px;
            background: #ff4b4b;
            box-shadow: 0 0 8px rgba(255, 75, 75, 0.8);
            border-radius: 2px;
        }

        /* Pressed State */
        .logout-btn:active {
            /* Button presses INTO the surface */
            background: var(--dark-surface);
            box-shadow: 
                inset 6px 6px 12px rgba(0,0,0,0.5), 
                inset -3px -3px 8px rgba(255,255,255,0.02);
        }
        .logout-btn:active .power-icon {
            opacity: 0.5; /* Light dims when pressed */
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginView">
        <h2>Auth_Node</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">USER_ID</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label for="password">KEY_PHRASE</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="login-btn">INITIALIZE</button>
        </form>
        <div id="message"></div>
    </div>

    <div class="dashboard-container" id="dashboardView">
        <div class="corner-detail tl"></div><div class="corner-detail tr"></div>
        <div class="corner-detail bl"></div><div class="corner-detail br"></div>
        
        <div class="glass-screen">
            <h2>User Profile: <span id="dashUser"></span></h2>
            
            <div class="data-grid">
                <div class="data-item">
                    <span class="data-label">System Status</span>
                    <span class="data-value cyan" id="dashStatus">Loading...</span>
                </div>
                <div class="data-item">
                    <span class="data-label">Security Uplink</span>
                    <span class="data-value" id="dashUplink">...</span>
                </div>
                <div class="data-item">
                    <span class="data-label">Active Nodes</span>
                    <span class="data-value cyan" id="dashNodes">...</span>
                </div>
                <div class="data-item">
                    <span class="data-label">CPU Load</span>
                    <span class="data-value" id="dashCpu">...</span>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="decorative-slider">
                <div class="slider-thumb"></div>
            </div>
            
            <button class="logout-btn" id="logoutBtn" title="Disengage">
                <div class="power-icon"></div>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
